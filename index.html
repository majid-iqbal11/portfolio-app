<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAM | Institutional Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root[data-theme="dark"] { --bg: #0b0f19; --card: rgba(17, 24, 39, 0.8); --text: #f1f5f9; }
        :root[data-theme="light"] { --bg: #f8fafc; --card: rgba(255, 255, 255, 0.9); --text: #1e293b; }
        
        body { background-color: var(--bg); color: var(--text); transition: 0.4s; font-family: 'Inter', sans-serif; }
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(128, 128, 128, 0.2); }
        .fade-in { animation: fadeIn 0.7s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-6xl flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center font-bold text-white">WAM</div>
            <h1 class="text-xl font-bold tracking-tighter uppercase">Wealth Matrix</h1>
        </div>
        <button onclick="toggleTheme()" class="px-4 py-2 bg-slate-800 rounded-full text-xs font-bold">MODE SWITCH</button>
    </header>

    <div id="loginCard" class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl fade-in mt-20">
        <h2 class="text-2xl font-bold mb-2">Secure Access</h2>
        <p class="opacity-60 mb-8">Enter your institutional credentials</p>
        <input type="text" placeholder="Quant ID" class="w-full bg-transparent border-b border-slate-500 py-3 mb-6 outline-none">
        <button onclick="login()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:scale-105 transition-all">Authorize System</button>
    </div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        // Login Animation Logic
        function login() {
            const card = document.getElementById('loginCard');
            card.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            setTimeout(() => {
                card.style.display = 'none';
                // Yahan aap apna dashboard show kar sakte hain
            }, 500);
        }
    </script>
</body>
</html>
